{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-infra-calculator.fullname" . }}
  labels:
    {{- include "ai-infra-calculator.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Single backend: the frontend container's nginx already reverse-
          # proxies /v1/*, /healthz, /docs, /redoc, /openapi.json to the
          # backend Service. One ingress rule keeps everything behind the
          # same host and avoids path-collision footguns at the ingress
          # controller level.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-infra-calculator.frontendFullname" . }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
