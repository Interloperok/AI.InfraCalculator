apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-infra-calculator.backendFullname" . }}
  labels:
    {{- include "ai-infra-calculator.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-infra-calculator.backendSelectorLabels" . | nindent 4 }}
