name: Bug report
description: Report a reproducible defect in backend/frontend behavior.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal reproducible case.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short one-line description of the problem.
      placeholder: API returns 500 for valid /v1/size payload
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend
        - frontend
        - docs
        - ci
        - infra
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime details for reproduction.
      value: |
        - OS:
        - Python:
        - Node:
        - Docker:
        - Browser (if frontend):
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps with exact input.
      placeholder: |
        1. Run `docker compose up --build`
        2. POST payload to /v1/size
        3. Observe response
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and traces
      description: Paste relevant logs, stack traces, screenshots, or request/response snippets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this issue on the latest `main`.
          required: true
