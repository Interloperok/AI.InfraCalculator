# Disabled intentionally while repository remains private.
# Enable by renaming this file to `ci.yml`.

name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - '.pre-commit-config.yaml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
              - '.pre-commit-config.yaml'
            infra:
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'
              - 'nginx/**'
              - '.github/workflows/**'

  repo-hygiene:
    name: Repo hygiene and secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv and Python 3.14
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Trim trailing whitespace
        run: uvx pre-commit run trailing-whitespace --all-files

      - name: Fix end of files
        run: uvx pre-commit run end-of-file-fixer --all-files

      - name: Check for merge conflicts
        run: uvx pre-commit run check-merge-conflict --all-files

      - name: Check for large added files
        run: uvx pre-commit run check-added-large-files --all-files

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --config gitleaks.toml --redact --no-banner

  backend-fast:
    name: Backend fast checks (branch push)
    needs: changes
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv and Python 3.14
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff lint (auto-fix aware)
        run: uv run ruff check --fix --exit-non-zero-on-fix .

      - name: Ruff format
        run: uv run ruff format .

      - name: Ensure backend tree is formatted
        run: git diff --exit-code -- backend

      - name: Ty check
        run: uv run ty check .

      - name: Mypy check
        run: uv run mypy .

      - name: Backend tests (fast)
        env:
          AI_SC_DISABLE_SCHEDULER: "1"
        run: uv run pytest -q

  backend-quality:
    name: Backend full checks (main/pr)
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
        needs.changes.outputs.backend == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv and Python 3.14
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff lint (auto-fix aware)
        run: uv run ruff check --fix --exit-non-zero-on-fix .

      - name: Ruff format
        run: uv run ruff format .

      - name: Ensure backend tree is formatted
        run: git diff --exit-code -- backend

      - name: Ty check
        run: uv run ty check .

      - name: Mypy check
        run: uv run mypy .

      - name: Backend tests with coverage gates
        env:
          AI_SC_DISABLE_SCHEDULER: "1"
        run: |
          uv run pytest --cov=. --cov-branch --cov-report=xml:coverage.xml --cov-report=html:htmlcov
          uv run coverage json -o coverage.json
          uv run python scripts/check_coverage_thresholds.py --overall-line 85 --overall-branch 80 --core-line 95 --core-branch 90

      - name: Backend Docker build
        run: docker build .

      - name: Upload backend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/coverage.json
            backend/htmlcov/
          if-no-files-found: warn

  frontend-fast:
    name: Frontend fast checks (branch push)
    needs: changes
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format
        run: npm run format

      - name: Ensure frontend tree is formatted
        run: git diff --exit-code -- frontend

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests (fast)
        run: npm run test:ci

  frontend-quality:
    name: Frontend full checks (main/pr)
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
        needs.changes.outputs.frontend == 'true'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format
        run: npm run format

      - name: Ensure frontend tree is formatted
        run: git diff --exit-code -- frontend

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests with coverage threshold
        run: npm run test:ci -- --coverage

      - name: Production build
        run: npm run build

      - name: Frontend Docker build
        run: docker build .

      - name: Upload frontend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/
          if-no-files-found: warn

  infra-compose-validate:
    name: Infra compose validate
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate local compose
        run: docker compose -f docker-compose.yml config -q

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config -q
