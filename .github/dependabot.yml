version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: uv
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Moscow
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Moscow
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Pinned in package.json: lucide-react ^0.288.0 (0.460+ ships broken
      # sourcemaps; 1.x renames/removes icon exports — see PR #83 / PR #71).
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      # Pinned in package.json: react-joyride ^2.9.3 (3.x dropped Skip/Back/
      # step counter chrome — see PR #71).
      - dependency-name: "react-joyride"
        update-types: ["version-update:semver-major"]
