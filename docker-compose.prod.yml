services:
  # Backend API сервис
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-server-calculator-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - ai-calculator-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React приложение
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-server-calculator-frontend
    ports:
      - "3000:80"
    environment:
      # nginx inside the container reverse-proxies /v1/*, /healthz, /docs,
      # /redoc, and /openapi.json to this URL. Point at the backend service
      # by its compose-network hostname so the browser only ever hits
      # http://localhost:3000 (UI + REST + Swagger on one port).
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-calculator-network
    restart: unless-stopped

networks:
  ai-calculator-network:
    driver: bridge

volumes:
  # Опционально: для персистентного хранения данных
  backend_data:
